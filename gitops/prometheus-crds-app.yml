apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-operator-crds
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: 85.0.1
    helm:
      values: |
        prometheus:
          enabled: false
        grafana:
          enabled: false
        alertmanager:
          enabled: false
        prometheusOperator:
          enabled: true
          manageCrds: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
