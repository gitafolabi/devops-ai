apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-operator-crds
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: 85.0.1
    helm:
      values: |
        prometheus:
          enabled: true
        grafana:
          enabled: true
          admin:
            existingSecret: grafana-admin-credentials
            userKey: admin-user
            passwordKey: admin-password
          service:
            type: ClusterIP
          sidecar:
            datasources:
              enabled: false
          additionalDataSources:
            - name: Prometheus
              type: prometheus
              access: proxy
              url: http://prometheus-operator-crds-k-prometheus.monitoring:9090
              isDefault: true
              jsonData:
                httpMethod: POST
                timeInterval: 30s
            - name: Alertmanager
              type: alertmanager
              access: proxy
              url: http://prometheus-operator-crds-k-alertmanager.monitoring:9093
              isDefault: false
              jsonData:
                handleGrafanaManagedAlerts: false
                implementation: prometheus
            - name: Loki
              type: loki
              access: proxy
              url: http://loki-stack.monitoring:3100
              isDefault: false
              jsonData:
                maxLines: 1000
        alertmanager:
          enabled: true
        prometheusOperator:
          enabled: true
          manageCrds: true
          admissionWebhooks:
            enabled: true
            certManager:
              enabled: true
        nodeExporter:
          enabled: true
        kubeStateMetrics:
          enabled: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - Validate=false
