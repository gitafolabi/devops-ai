# For AWS EKS deployments: swap external-secret.yml for this file in kustomization.yml.
# Requires the aws-sm ClusterSecretStore and IRSA role with secretsmanager:GetSecretValue.
# Secret path convention: boutique/<key> (e.g. boutique/POSTGRES_PASSWORD)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: boutique-secrets
  namespace: boutique
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-sm
    kind: ClusterSecretStore
  target:
    name: boutique-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_DB
      remoteRef:
        key: boutique/POSTGRES_DB
    - secretKey: POSTGRES_USER
      remoteRef:
        key: boutique/POSTGRES_USER
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: boutique/POSTGRES_PASSWORD
    - secretKey: AUTH_DB_URL
      remoteRef:
        key: boutique/AUTH_DB_URL
    - secretKey: PRODUCTS_DB_URL
      remoteRef:
        key: boutique/PRODUCTS_DB_URL
    - secretKey: ORDERS_DB_URL
      remoteRef:
        key: boutique/ORDERS_DB_URL
    - secretKey: USERS_DB_URL
      remoteRef:
        key: boutique/USERS_DB_URL
    - secretKey: RABBIT_URL
      remoteRef:
        key: boutique/RABBIT_URL
    - secretKey: RABBITMQ_USER
      remoteRef:
        key: boutique/RABBITMQ_USER
    - secretKey: RABBITMQ_PASSWORD
      remoteRef:
        key: boutique/RABBITMQ_PASSWORD
    - secretKey: SMTP_HOST
      remoteRef:
        key: boutique/SMTP_HOST
    - secretKey: SMTP_PORT
      remoteRef:
        key: boutique/SMTP_PORT
    - secretKey: SMTP_USER
      remoteRef:
        key: boutique/SMTP_USER
    - secretKey: SMTP_PASS
      remoteRef:
        key: boutique/SMTP_PASS
    - secretKey: EMAIL_FROM
      remoteRef:
        key: boutique/EMAIL_FROM
