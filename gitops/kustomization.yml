apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Secret store selection:
#   Azure AKS  → cluster-secret-store.yml  + external-secret.yml      (current)
#   AWS EKS    → aws-cluster-secret-store.yml + aws-external-secret.yml
# Swap the two lines below when deploying to AWS.

resources:
  - namespace.yml
  - cluster-secret-store.yml
  - external-secret.yml
  # AWS equivalents (uncomment and remove azure lines above for EKS deployments):
  # - aws-cluster-secret-store.yml
  # - aws-external-secret.yml
  - k8s/database/configmap.yml
  - k8s/database/restore-job.yml
  - k8s/database/statefulset.yml
  - k8s/database/service.yml
  - k8s/backend/gateway.yml
  - k8s/backend/auth.yml
  - k8s/backend/product-service.yml
  - k8s/backend/order-service.yml
  - k8s/backend/orders.yml
  - k8s/backend/user-service.yml
  - k8s/backend/rabbitmq.yml
  - k8s/backend/jaeger.yml
  - k8s/backend/notification-service.yml
  - k8s/frontend/deployment.yml
  - k8s/hpa.yml
  - k8s/pdb.yml
  - k8s/grafana-dashboard.yml
  - k8s/backend/service-monitor.yml
  - k8s/ingress.yml
  - k8s/monitoring-ingress.yml
  - k8s/tools-ingress.yml
  - ingres-argo.yml
  - cert-manager-clusterissuer.yml
  - prometheus-crds-app.yml
  - cert-manager-argo.yml

generatorOptions:
  disableNameSuffixHash: true
