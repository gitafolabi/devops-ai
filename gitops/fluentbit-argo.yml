apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluent-bit
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://fluent.github.io/helm-charts
    chart: fluent-bit
    targetRevision: 0.43.0
    helm:
      values: |
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

        config:
          # ── Inputs ───────────────────────────────────────────────────────
          inputs: |
            [INPUT]
                Name              tail
                Tag               kube.*
                Path              /var/log/containers/*.log
                Parser            cri
                DB                /var/log/flb_kube.db
                Mem_Buf_Limit     32MB
                Skip_Long_Lines   On
                Refresh_Interval  10

          # ── Filters ──────────────────────────────────────────────────────
          filters: |
            # Enrich all container logs with Kubernetes metadata
            [FILTER]
                Name                kubernetes
                Match               kube.*
                Kube_URL            https://kubernetes.default.svc:443
                Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
                Merge_Log           On
                Keep_Log            Off
                K8S-Logging.Parser  On
                K8S-Logging.Exclude Off

            # Route boutique app logs
            [FILTER]
                Name    modify
                Match   kube.*
                Condition Key_Value_Equals $kubernetes['namespace_name'] boutique
                Add     dataset boutique.app

            # Route nginx access logs (stdout) and error logs (stderr) separately
            [FILTER]
                Name    modify
                Match   kube.*
                Condition Key_Value_Equals $kubernetes['namespace_name'] ingress-nginx
                Condition Key_Value_Equals stream stdout
                Add     dataset nginx.access

            [FILTER]
                Name    modify
                Match   kube.*
                Condition Key_Value_Equals $kubernetes['namespace_name'] ingress-nginx
                Condition Key_Value_Equals stream stderr
                Add     dataset nginx.error

            # Route monitoring namespace logs
            [FILTER]
                Name    modify
                Match   kube.*
                Condition Key_Value_Equals $kubernetes['namespace_name'] monitoring
                Add     dataset monitoring.infra

            # Default dataset for anything untagged
            [FILTER]
                Name    modify
                Match   kube.*
                Condition Key_Does_Not_Exist dataset
                Add     dataset kube.general

          # ── Outputs ──────────────────────────────────────────────────────
          outputs: |
            [OUTPUT]
                Name          forward
                Match         kube.*
                Host          logstash-logstash
                Port          24224
                Retry_Limit   5

        tolerations:
          - key: node-role.kubernetes.io/master
            operator: Exists
            effect: NoSchedule
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule

        serviceAccount:
          create: true
          annotations: {}

        rbac:
          create: true
          nodeAccess: true

  destination:
    server: https://kubernetes.default.svc
    namespace: logging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
