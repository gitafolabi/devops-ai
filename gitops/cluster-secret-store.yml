apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: azure-kv
spec:
  provider:
    azurekv:
      vaultUrl: "https://crud-kv.vault.azure.net/"
      authType: ServicePrincipal
      tenantId: "<YOUR_TENANT_ID>"
      authSecretRef:
        clientId:
          name: azure-sp-credentials
          key: client-id
          namespace: default
        clientSecret:
          name: azure-sp-credentials
          key: client-secret
          namespace: default
