apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox:1.28
          command: ['sh', '-c', "until nc -zv rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done"]
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: orders
          image: avurlerby/orders:84333b5a0924e97d29b02a6a34d81e434dd5bdab
          ports:
            - containerPort: 3005
          resources:
            requests:
              memory: "64Mi"   # prod: 128Mi
              cpu: "50m"       # prod: 100m
            limits:
              memory: "128Mi"  # prod: 512Mi
              cpu: "100m"      # prod: 500m
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            tcpSocket:
              port: 3005
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 5
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3005"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: ORDERS_DB_URL
            - name: PRODUCTS_SERVICE_URL
              value: "http://product-service:3003"
            - name: RABBIT_URL
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: RABBIT_URL
            - name: OTLP_ENDPOINT
              value: "http://jaeger:4318/v1/traces"

---

apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: boutique
spec:
  selector:
    app: orders
  ports:
    - protocol: TCP
      port: 3005
      targetPort: 3005
  type: ClusterIP
