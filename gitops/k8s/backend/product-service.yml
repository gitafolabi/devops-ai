apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: avurlerby/product-service:0cfcb69ec537ef9accd6f6db6f663a58dee9ab22
          ports:
            - containerPort: 3003
          env:
            - name: NODE_ENV
              value: development
            - name: PORT
              value: "3003"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: PRODUCTS_DB_URL

---

apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: boutique
spec:
  selector:
    app: product-service
  ports:
    - protocol: TCP
      port: 3003
      targetPort: 3003
  type: ClusterIP
