apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox:1.28
          command: ['sh', '-c', "until nc -zv rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done"]
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: notification-service
          image: avurlerby/notification-service:c40bab802e48334bb404592840e5fef0b8f6b57d
          resources:
            requests:
              memory: "32Mi"   # prod: 64Mi
              cpu: "25m"       # prod: 50m
            limits:
              memory: "64Mi"   # prod: 128Mi
              cpu: "50m"       # prod: 200m
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: NODE_ENV
              value: production
            - name: RABBIT_URL
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: RABBIT_URL
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: SMTP_HOST
                  optional: true
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: SMTP_PORT
                  optional: true
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: SMTP_USER
                  optional: true
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: SMTP_PASS
                  optional: true
            - name: EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: EMAIL_FROM
                  optional: true
