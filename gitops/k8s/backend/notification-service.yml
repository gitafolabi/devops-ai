apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox:1.28
          command: ['sh', '-c', "until nc -zv rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done"]
      containers:
        - name: notification-service
          image: avurlerby/notification-service:5bb4e34fbf0d061bd9ee473c7587671c6fd9e8b3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          env:
            - name: NODE_ENV
              value: production
            - name: RABBIT_URL
              value: "amqp://guest:guest@rabbitmq:5672"
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: SMTP_HOST
                  optional: true
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: SMTP_PORT
                  optional: true
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: SMTP_USER
                  optional: true
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: SMTP_PASS
                  optional: true
            - name: EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: EMAIL_FROM
                  optional: true
