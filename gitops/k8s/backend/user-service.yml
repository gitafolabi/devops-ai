apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: user-service
          image: avurlerby/user-service:84333b5a0924e97d29b02a6a34d81e434dd5bdab
          ports:
            - containerPort: 3006
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: NODE_ENV
              value: development
            - name: PORT
              value: "3006"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: boutique-secrets
                  key: USERS_DB_URL

---

apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: boutique
spec:
  selector:
    app: user-service
  ports:
    - protocol: TCP
      port: 3006
      targetPort: 3006
  type: ClusterIP
