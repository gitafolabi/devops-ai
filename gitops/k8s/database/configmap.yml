apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: boutique
data:
  10-create-databases.sql: |
    SELECT 'CREATE DATABASE auth_db'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'auth_db')\gexec
    SELECT 'CREATE DATABASE products_db'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'products_db')\gexec
    SELECT 'CREATE DATABASE orders_db'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'orders_db')\gexec
    SELECT 'CREATE DATABASE users_db'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'users_db')\gexec
    \c auth_db
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";

  20-init-schema.sql: |
    \c auth_db
    CREATE TABLE IF NOT EXISTS users (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      first_name VARCHAR(255) NOT NULL,
      last_name VARCHAR(255) NOT NULL,
      email VARCHAR(255) UNIQUE NOT NULL,
      password VARCHAR(255) NOT NULL,
      password_hash VARCHAR(255) NOT NULL,
      role VARCHAR(50) DEFAULT 'customer',
      subscribe_newsletter BOOLEAN DEFAULT FALSE,
      created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    ALTER TABLE users
      ADD COLUMN IF NOT EXISTS password VARCHAR(255),
      ADD COLUMN IF NOT EXISTS password_hash VARCHAR(255);

    \c products_db
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";

    CREATE TABLE IF NOT EXISTS products (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      name VARCHAR(255) UNIQUE NOT NULL,
      description TEXT,
      price DECIMAL(10,2) NOT NULL,
      category VARCHAR(100),
      image_url VARCHAR(255),
      stock_quantity INTEGER DEFAULT 0,
      created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    \c users_db
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";

    CREATE TABLE IF NOT EXISTS profiles (
      user_id UUID PRIMARY KEY,
      address TEXT,
      phone VARCHAR(20),
      avatar_url VARCHAR(255)
    );

    \c orders_db
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";

    CREATE TABLE IF NOT EXISTS orders (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      user_id UUID NOT NULL,
      total_amount DECIMAL(10,2) NOT NULL,
      status VARCHAR(50) DEFAULT 'pending',
      shipping_address JSONB,
      payment_status VARCHAR(50) DEFAULT 'pending',
      created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    ALTER TABLE orders
      ADD COLUMN IF NOT EXISTS shipping_address JSONB,
      ADD COLUMN IF NOT EXISTS payment_status VARCHAR(50) DEFAULT 'pending',
      ADD COLUMN IF NOT EXISTS updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP;

    CREATE TABLE IF NOT EXISTS order_items (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      order_id UUID NOT NULL REFERENCES orders(id) ON DELETE CASCADE,
      product_id UUID NOT NULL,
      quantity INTEGER NOT NULL CHECK (quantity > 0),
      price DECIMAL(10,2) NOT NULL,
      created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

  quick-seed.sql: |
    \c products_db
    INSERT INTO products (name, description, price, category, image_url, stock_quantity)
    SELECT name, description, price, category, image_url, stock_quantity
    FROM (VALUES
    ('Midnight Velvet Dress', 'Elegant evening wear for formal occasions.', 129.99, 'Women', '/product-images/midnight-velvet.jpg', 50),
    ('Urban Denim Jacket', 'Rugged and stylish denim jacket for everyday use.', 85.00, 'Men', '/product-images/denim-jacket.jpg', 30),
    ('Classic Leather Boots', 'Durable hand-crafted leather boots.', 150.00, 'Shoes', 'https://images.unsplash.com/photo-1520639889410-d04196f73176', 20),
    ('Silk Floral Scarf', 'Lightweight silk scarf with vibrant floral patterns.', 45.00, 'Accessories', 'https://images.unsplash.com/photo-1606760227091-3dd870d97f1d', 100),
    ('Slim-Fit Chinos', 'Premium cotton chinos in olive green.', 65.00, 'Men', 'https://images.unsplash.com/photo-1473966968600-fa804b86862b', 40),
    ('Cashmere Turtleneck', 'Ultra-soft grey cashmere sweater.', 120.00, 'Women', 'https://images.unsplash.com/photo-1583846717393-dc2412c95ed7', 25),
    ('Aviator Sunglasses', 'Classic gold-rimmed polarized lenses.', 110.00, 'Accessories', 'https://images.unsplash.com/photo-1511499767390-903390e6fbc4', 60),
    ('Minimalist Watch', 'Stainless steel watch with a black leather strap.', 180.00, 'Accessories', 'https://images.unsplash.com/photo-1524592094714-0f0654e20314', 15)
    ) AS seed(name, description, price, category, image_url, stock_quantity)
    WHERE NOT EXISTS (
      SELECT 1 FROM products p WHERE p.name = seed.name
    );
