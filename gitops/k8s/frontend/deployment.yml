apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: frontend
          image: avurlerby/frontend:c40bab802e48334bb404592840e5fef0b8f6b57d
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "32Mi"   # prod: 64Mi
              cpu: "25m"       # prod: 50m
            limits:
              memory: "64Mi"   # prod: 256Mi
              cpu: "50m"       # prod: 200m
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: REACT_APP_API_URL
              value: "/api"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: boutique
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
