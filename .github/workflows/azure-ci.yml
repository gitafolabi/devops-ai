name: Boutique CI Pipeline Azure

on:
  workflow_dispatch:

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - auth
          - gateway
          - orders
          - order-service
          - product-service
          - user-service
          - notification-service
          - frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
     
      - name: Build Docker Image
        run: |
          if [ "${{ matrix.service }}" == "frontend" ]; then
            BUILD_PATH="projects/boutique-microservices/frontend"
          else
            BUILD_PATH="projects/boutique-microservices/backend/services/${{ matrix.service }}"
          fi

          echo "Building from $BUILD_PATH"

          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }} \
          $BUILD_PATH


      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

      - name: Push Docker Image
        run: |
          IMAGE_URI=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
          echo "Pushing $IMAGE_URI"
          docker push $IMAGE_URI

  update-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in k8s manifests
        run: |
          NEW_TAG=${{ github.sha }}

          for SERVICE in auth gateway orders order-service product-service user-service notification-service; do
            MANIFEST="gitops/k8s/backend/${SERVICE}.yml"
            sed -i "s|${{ secrets.DOCKERHUB_USERNAME }}/${SERVICE}:.*|${{ secrets.DOCKERHUB_USERNAME }}/${SERVICE}:${NEW_TAG}|g" $MANIFEST
          done

          sed -i "s|${{ secrets.DOCKERHUB_USERNAME }}/frontend:.*|${{ secrets.DOCKERHUB_USERNAME }}/frontend:${NEW_TAG}|g" gitops/k8s/frontend/deployment.yml

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gitops/k8s/
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push

